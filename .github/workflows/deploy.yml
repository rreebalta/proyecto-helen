name: Ofuscar y desplegar a GitHub Pages

on:
  # Se ejecuta cuando haces push a la rama 'main' (o 'master')
  push:
    branches: ["main"]
  # Permite ejecutar el workflow manualmente desde la pestaña "Actions"
  workflow_dispatch:

# Permisos para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite una sola ejecución concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar script de ofuscación (build)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact (la carpeta 'dist')
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # <--- ¡Importante! Aquí se especifica la carpeta a desplegar

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
